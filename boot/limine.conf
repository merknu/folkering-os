# Limine v8 Configuration for Folkering OS
# https://github.com/limine-bootloader/limine/blob/v8.x/CONFIG.md

# Boot timeout in seconds (0 = boot immediately)
timeout: 0

# Verbose boot messages
verbose: yes

# Serial console output
serial: yes

# Default entry (1-based index)
default_entry: 1

# Boot entry
/ Folkering OS
    protocol: limine
    kernel_path: boot():/boot/kernel.elf
    module_path: boot():/boot/initrd.fpk
    cmdline: loglevel=debug
    kaslr: no
