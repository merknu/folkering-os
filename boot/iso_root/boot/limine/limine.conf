# Limine Configuration for Folkering OS
# https://github.com/limine-bootloader/limine/blob/trunk/CONFIG.md

# Timeout in seconds (0 = no timeout, boot immediately)
timeout: 5
verbose: yes
serial: yes

# Branding
interface_branding: Folkering OS Bootloader

# Default entry
default_entry: 0

# Folkering OS Entry
/Folkering OS
    # Protocol: Limine
    protocol: limine

    # Kernel path (relative to boot volume root)
    kernel_path: boot():/boot/kernel.elf

    # Kernel command line (optional)
    # Can be used to pass boot parameters
    kernel_cmdline: loglevel=debug

    # Initrd/ramdisk module
    module_path: boot():/boot/initrd.fpk

    # Resolution (optional - comment out for default)
    # resolution: 1024x768

    # Serial console for debugging
    # Limine will output to both VGA and serial

    # KASLR (Kernel Address Space Layout Randomization)
    # Disable for MVP - makes debugging easier
    kaslr: no

    # Higher Half Direct Map Offset
    # HHDM is automatically set up by Limine
    # Kernel can access it via HHDM request
